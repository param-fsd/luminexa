[build.environment]
NODE_VERSION = "20.17.0"
# Omit NEXT_PUBLIC_* Firebase keys from secrets scanning — Next.js intentionally
# embeds these into client-side bundles at build time, so the scanner would
# otherwise flag them as leaked secrets (false positive).
# Also omit GOOGLE_* keys used server-side in the Dialogflow API route; their
# values never appear in the build output but smart detection may still flag
# the env-var patterns.
SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,GOOGLE_CLIENT_EMAIL,GOOGLE_PRIVATE_KEY,GOOGLE_PROJECT_ID"