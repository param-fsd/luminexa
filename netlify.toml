[build.environment]
# Exclude NEXT_PUBLIC_* Firebase keys from secrets scanning — these are intentionally
# public values that Next.js inlines into client-side bundles by design.
# Also exclude GOOGLE_* server-side keys which are read at runtime in API routes
# but may appear in bundled server function code.
SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,GOOGLE_PRIVATE_KEY,GOOGLE_CLIENT_EMAIL,GOOGLE_PROJECT_ID"